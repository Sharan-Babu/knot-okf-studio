name: Release validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Deterministic ship gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: xvfb-run -a npm run test:ship
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-evidence
          path: test-results
          if-no-files-found: ignore

  native-packages:
    name: ${{ matrix.name }} package
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            build: npm run dist -- --linux --x64
            smoke: xvfb-run -a npm run test:packaged:linux
            artifacts: |
              release/*.AppImage
              release/*.deb
          - name: Windows x64
            os: windows-latest
            build: npm run dist -- --win --x64
            smoke: node tests/packaged-windows-smoke.mjs
            artifacts: |
              release/*.exe
              release/*-win.zip
          - name: macOS native
            os: macos-14
            build: npm run dist -- --mac
            smoke: npm run test:packaged:mac
            artifacts: |
              release/*.dmg
              release/*-mac.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: ${{ matrix.build }}
      - run: ${{ matrix.smoke }}
      - uses: actions/upload-artifact@v4
        with:
          name: knot-${{ runner.os }}-unsigned
          path: ${{ matrix.artifacts }}
          if-no-files-found: error
