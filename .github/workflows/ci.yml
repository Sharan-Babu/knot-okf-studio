name: quality

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:mcp
      - run: npm run build
      - name: Electron persona suite (macOS and Windows)
        if: runner.os != 'Linux'
        run: npx playwright test
      - name: Electron persona suite (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test
